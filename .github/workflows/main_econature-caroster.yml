# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - econature-caroster

on:
    push:
        branches:
            - main
    workflow_dispatch:
env:
    NODE_ENV: production
    DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
    DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
    DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
    DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
    DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
    DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: ./backend

        steps:
            - uses: actions/checkout@v4
            - name: Set-up dependencies
              run: |
                  sudo apt update
                    sudo apt upgrade -y
                    sudo apt install libpng-dev build-essential -y

            - name: Set up Node.js version
              uses: actions/setup-node@v3
              with:
                  node-version: "24.x"

            - name: npm install
              run: npm install --production=false

            - name: npm fix sharp
              run: npm install --ignore-scripts=false --foreground-scripts --verbose sharp

            - name: npm build
              run: npm run build --if-present

            # - name: npm test
            #   run: npm run test --if-present

            - name: Upload artifact for deployment job
              uses: actions/upload-artifact@v4
              with:
                  name: node-app
                  path: .

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download artifact from build job
              uses: actions/download-artifact@v4
              with:
                  name: node-app

            - name: "Deploy to Azure Web App"
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v3
              with:
                  app-name: "econature-caroster"
                  slot-name: "Production"
                  package: .
                  publish-profile: ${{ secrets.PUBLISH_PROFILE }}
